# Example configuration for HackMD client
quarkus.rest-client.hackmd.url=https://api.hackmd.io

# Replace with a real token before running the example
hackmd.token=changeme

# Optional: identify your app in HackMD logs
hackmd.user-agent=hackmd-client-example/0.1.0

# Optional: SDK-level retry behavior
hackmd.retry-enabled=false
hackmd.retry-max-retries=3
hackmd.retry-delay-millis=500
